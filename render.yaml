services:
  - type: web
      name: adaba-ois-backend
          runtime: node
              rootDir: backend
                  buildCommand: npm install
                      startCommand: node server.js
                          plan: free
                              envVars:
                                    - key: NODE_ENV
                                            value: production
                                                  - key: PORT
                                                          value: 3000
                                                                - key: WHATSAPP_VERIFY_TOKEN
                                                                        value: adaba2025
                                                                              - key: OPENAI_API_KEY
                                                                                      value: sk-placeholder
                                                                                            - key: DATABASE_URL
                                                                                                    fromDatabase:
                                                                                                              name: adaba-ois-db
                                                                                                                        property: connectionString
                                                                                                                        
                                                                                                                          - type: web
                                                                                                                              name: adaba-lead-dedup
                                                                                                                                  runtime: python
                                                                                                                                      rootDir: lead-dedup
                                                                                                                                          buildCommand: pip install -r requirements.txt
                                                                                                                                              startCommand: python app.py
                                                                                                                                                  plan: free
                                                                                                                                                      envVars:
                                                                                                                                                            - key: DATABASE_URL
                                                                                                                                                                    fromDatabase:
                                                                                                                                                                              name: adaba-ois-db
                                                                                                                                                                                        property: connectionString
                                                                                                                                                                                              - key: TELEGRAM_BOT_TOKEN
                                                                                                                                                                                                      value: 8662642978:AAFR4-eP1eEjsnA-63FZpXuTtlhxdpWJJjI
                                                                                                                                                                                                            - key: TELEGRAM_REPORT_CHANNEL_ID
                                                                                                                                                                                                                    value: YOUR_REPORT_CHANNEL_ID
                                                                                                                                                                                                                          - key: GMAIL_CREDENTIALS_PATH
                                                                                                                                                                                                                                  value: /etc/secrets/credentials.json
                                                                                                                                                                                                                                        - key: GMAIL_TOKEN_PATH
                                                                                                                                                                                                                                                value: /etc/secrets/token.json
                                                                                                                                                                                                                                                      - key: POLL_INTERVAL_SECONDS
                                                                                                                                                                                                                                                              value: 120
                                                                                                                                                                                                                                                                    - key: PORT
                                                                                                                                                                                                                                                                            value: 8080
                                                                                                                                                                                                                                                                                  - key: PYTHON_VERSION
                                                                                                                                                                                                                                                                                          value: 3.11.9
                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                          databases:
                                                                                                                                                                                                                                                                                            - name: adaba-ois-db
                                                                                                                                                                                                                                                                                                databaseName: adaba_ois
                                                                                                                                                                                                                                                                                                    plan: free
