services:
  - type: web
    name: adaba-ois-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: WHATSAPP_VERIFY_TOKEN
        value: adaba2025
      - key: OPENAI_API_KEY
        value: sk-placeholder
      - key: DATABASE_URL
        fromDatabase:
          name: adaba-ois-db
          property: connectionString

databases:
  - name: adaba-ois-db
    databaseName: adaba_ois
    plan: free
